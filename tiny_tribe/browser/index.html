<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tiny-TRIBE: Brain Activity Prediction</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #6366f1, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #888; margin-bottom: 2rem; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
        .panel {
            background: #141414;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 1.5rem;
        }
        .panel h2 {
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        #brain-canvas {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 8px;
            background: #0a0a0a;
        }
        .upload-area {
            border: 2px dashed #333;
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .upload-area:hover { border-color: #6366f1; }
        .upload-area input { display: none; }
        .status {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-family: monospace;
        }
        .status.loading { background: #1a1a2e; color: #6366f1; }
        .status.ready { background: #0a2e1a; color: #4ade80; }
        .status.error { background: #2e0a0a; color: #f87171; }
        .controls {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        select, button {
            background: #1a1a1a;
            color: #e0e0e0;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            cursor: pointer;
        }
        button:hover { background: #6366f1; border-color: #6366f1; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        .metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .metric {
            background: #1a1a1a;
            padding: 0.75rem;
            border-radius: 6px;
            text-align: center;
        }
        .metric .value { font-size: 1.4rem; font-weight: 700; color: #a78bfa; }
        .metric .label { font-size: 0.7rem; color: #888; margin-top: 0.25rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tiny-TRIBE</h1>
        <p class="subtitle">Browser-based brain activity prediction from multimodal stimuli</p>

        <div class="grid">
            <div>
                <div class="panel">
                    <h2>Input</h2>
                    <div class="upload-area" id="upload-area">
                        <p>Drop a video file here or click to upload</p>
                        <p style="color: #666; font-size: 0.8rem; margin-top: 0.5rem">
                            Supports MP4, WebM (extracts video frames + audio)
                        </p>
                        <input type="file" id="video-input" accept="video/*" />
                    </div>

                    <div class="controls">
                        <select id="subject-select">
                            <option value="0">Subject 01</option>
                            <option value="1">Subject 02</option>
                            <option value="2">Subject 03</option>
                        </select>
                        <button id="run-btn" disabled>Run Prediction</button>
                    </div>

                    <div id="status" class="status loading">Loading models...</div>
                </div>

                <div class="panel" style="margin-top: 1rem;">
                    <h2>Performance</h2>
                    <div class="metrics">
                        <div class="metric">
                            <div class="value" id="metric-size">~120</div>
                            <div class="label">Model Size (MB)</div>
                        </div>
                        <div class="metric">
                            <div class="value" id="metric-latency">--</div>
                            <div class="label">Inference (ms)</div>
                        </div>
                        <div class="metric">
                            <div class="value" id="metric-vertices">5,124</div>
                            <div class="label">Vertices</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="panel">
                <h2>Brain Activation Map</h2>
                <canvas id="brain-canvas"></canvas>
            </div>
        </div>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
